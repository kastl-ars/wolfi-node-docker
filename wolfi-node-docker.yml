---

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - bash
    - ca-certificates-bundle
    - coreutils
    - gawk
    - grep
    - gnutar
    - gzip
    - docker
    - nodejs-26
    - shadow-subids

environment:
  PATH: /usr/sbin:/sbin:/usr/bin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

entrypoint:
  command: /usr/bin/bash

paths:
  - path: /bin/sh
    type: symlink
    source: /bin/bash
    permissions: 0o755
    uid: 0
    gid: 0

accounts:
  groups:
    - groupname: nobody
      gid: 65532
  users:
    - username: nobody
      uid: 65532
  run-as: root

archs:
  - amd64
  - arm64
